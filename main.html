// ── CAROUSEL LOGIC ─────────────────────────────────────────────────────────
const track = document.getElementById('carouselTrack');
const wrapper = document.getElementById('carouselWrapper');
const dotsContainer = document.getElementById('carouselDots');

let currentIndex = 1;
let isDragging = false;
let startX = 0;
let startScrollLeft = 0;
let dragDistance = 0;

const CARD_WIDTH = 180;
const GAP = 20;
const STEP = CARD_WIDTH + GAP;

artifacts.forEach((a, i) => {
  const card = document.createElement('div');
  card.className = 'carousel-card' + (i === currentIndex ? ' active' : '');
  card.dataset.index = i;
  card.innerHTML = `<div class="card-img-wrap">${a.svg}</div><div class="card-name">${a.name}</div>`;
  card.addEventListener('click', () => { if (Math.abs(dragDistance) < 5) openDetail(i); });
  track.appendChild(card);
});

artifacts.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === currentIndex ? ' active' : '');
  dot.addEventListener('click', () => scrollToIndex(i));
  dotsContainer.appendChild(dot);
});

function scrollToIndex(idx) {
  idx = Math.max(0, Math.min(artifacts.length - 1, idx));
  currentIndex = idx;
  const wrapperWidth = wrapper.clientWidth;
  const offset = idx * STEP - (wrapperWidth / 2 - CARD_WIDTH / 2);
  track.style.transform = `translateX(${-Math.max(0, offset)}px)`;
  document.querySelectorAll('.carousel-card').forEach((c, i) => c.classList.toggle('active', i === idx));
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

wrapper.addEventListener('mousedown', e => {
  isDragging = true; dragDistance = 0; startX = e.pageX;
  const m = track.style.transform.match(/translateX\((.+)px\)/);
  startScrollLeft = m ? parseFloat(m[1]) : 0;
  track.style.transition = 'none';
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  dragDistance = e.pageX - startX;
  track.style.transform = `translateX(${startScrollLeft + dragDistance}px)`;
});
document.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  track.style.transition = '';
  if (dragDistance < -50) scrollToIndex(currentIndex + 1);
  else if (dragDistance > 50) scrollToIndex(currentIndex - 1);
  else scrollToIndex(currentIndex);
});

let touchStartX = 0;
wrapper.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; dragDistance = 0; }, { passive: true });
wrapper.addEventListener('touchmove', e => { dragDistance = e.touches[0].clientX - touchStartX; }, { passive: true });
wrapper.addEventListener('touchend', () => {
  if (dragDistance < -50) scrollToIndex(currentIndex + 1);
  else if (dragDistance > 50) scrollToIndex(currentIndex - 1);
  else scrollToIndex(currentIndex);
});

setTimeout(() => scrollToIndex(2), 50);

// ── DETAIL VIEW ────────────────────────────────────────────────────────────
const overlay = document.getElementById('detailOverlay');
const closeBtn = document.getElementById('detailClose');

function openDetail(idx) {
  const a = artifacts[idx];
  document.getElementById('detailEra').textContent = a.era;
  document.getElementById('detailTitle').textContent = a.name;
  document.getElementById('detailOrigin').textContent = a.origin;
  document.getElementById('detailDesc').textContent = a.desc;
  document.getElementById('detailNumber').textContent = `Catalogue № ${a.id}`;
  const imgWrap = document.getElementById('detailImgWrap');
  imgWrap.innerHTML = a.svg.replace(/width="\d+"/, 'width="200"').replace(/height="\d+"/, 'height="260"');
  document.getElementById('detailMeta').innerHTML = Object.entries(a.meta).map(([k,v]) =>
    `<div class="meta-item"><div class="meta-label">${k}</div><div class="meta-value">${v}</div></div>`
  ).join('');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

closeBtn.addEventListener('click', closeDetail);
overlay.addEventListener('click', e => { if (e.target === overlay) closeDetail(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
  if (e.key === 'ArrowRight') scrollToIndex(currentIndex + 1);
  if (e.key === 'ArrowLeft') scrollToIndex(currentIndex - 1);
});
</script>
</body>
